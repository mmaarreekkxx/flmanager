<html>
<head>
    <style>
        /* Updated styles for better spacing and visual hierarchy */
        .report-controls {
            padding: 20px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
        }
        .export-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .export-button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .export-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="report-controls">
        <h2>Report Controls</h2>
        <div class="export-controls">
            <button class="export-button">Export to PDF</button>
            <button class="export-button">Export to Excel</button>
        </div>
    </div>
</body>
</html>
